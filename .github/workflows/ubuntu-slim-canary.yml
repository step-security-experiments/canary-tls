name: ubuntu-slim canary (PR #657)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-ubuntu-slim:
    runs-on: ubuntu-slim
    steps:
      - name: Harden Runner
        uses: devantler/harden-runner@fix/ubuntu-slim-user-env
        with:
          egress-policy: audit

      - name: Sanity step
        run: echo "ubuntu-slim canary reached the next step"

  test-ubuntu-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: devantler/harden-runner@fix/ubuntu-slim-user-env
        with:
          egress-policy: audit

      - name: Sanity step
        run: echo "ubuntu-latest regression check reached the next step"
