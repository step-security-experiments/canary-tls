name: IP Block

on:
  workflow_dispatch:

jobs:
  ip-block:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@rc
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
           api.github.com:443
           github.com:443
           www.google.com:443
           1.1.1.1:80
           208.67.222.222:*

      - uses: actions/checkout@v3

      - run: curl https://www.google.com
      - name: "do 1.1.1.1:80"
        if: always()  
        run: curl --connect-timeout 5 -Iv "http://1.1.1.1:80" 
      - name: "do 1.1.1.1:443"
        if: always()  
        run: curl --connect-timeout 5 -Iv "http://1.1.1.1:443" 
      - name: "do https://microsoft.com"
        if: always()  
        run: curl --connect-timeout 5 -Iv "https://microsoft.com" 
      - name: "do 208.67.222.222:80"
        if: always()  
        run: curl --connect-timeout 5 -Iv "http://208.67.222.222:80" 
      - name: "do 142.250.80.46:80"
        if: always()  
        run: curl --connect-timeout 5 -Iv "http://142.250.80.46:80" 
      - name: "do 93.184.216.34:80"
        if: always()  
        run: curl --connect-timeout 5 -Iv "http://93.184.216.34:80" 
